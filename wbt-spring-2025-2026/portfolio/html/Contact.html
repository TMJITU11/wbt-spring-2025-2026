<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Me</title>
    <link rel="stylesheet" href="../css/contact.css">
</head>

<body>

    <header class="container">
        <h1>Contact Form</h1>

        <nav class="navbar" aria-label="Primary">
            <a href="../index.html">Home</a>
        </nav>

        <hr />
    </header>


    <main>
        <section aria-labelledby="contact-info">
            <h2 id="contact-info">Contact Information</h2>

            <form method="post">
                <fieldset>
                    <legend>Fill up the form</legend>

                    <table>
                        <tr>
                            <td><label for="f_name">First Name:</label></td>
                            <td>
                                <input type="text" id="f_name" name="f_name" placeholder="Enter your First Name"
                                    required />
                            </td>
                        </tr>

                        <tr>
                            <td><label for="l_name">Last Name:</label></td>
                            <td>
                                <input type="text" id="l_name" name="l_name" placeholder="Enter your Last Name"
                                    required />
                            </td>
                        </tr>

                        <tr>
                            <td><span>Gender:</span></td>
                            <td>
                                <label>
                                    <input type="radio" name="gender" value="male" required />
                                    Male
                                </label>

                                <label>
                                    <input type="radio" name="gender" value="female" />
                                    Female
                                </label>
                            </td>
                        </tr>

                        <tr>
                            <td><label for="email">Email:</label></td>
                            <td>
                                <input type="email" id="email" name="email" placeholder="Enter your email" required />
                            </td>
                        </tr>

                        <tr>
                            <td><label for="company">Company:</label></td>
                            <td>
                                <input type="text" id="company" name="company" placeholder="Company name" />
                            </td>
                        </tr>

                        <tr>
                            <td><label for="reason">Reason of Contact:</label></td>
                            <td>
                                <select id="reason" name="reason" required>
                                    <option value="">-- Select one --</option>
                                    <option value="projects">Projects</option>
                                    <option value="thesis">Thesis</option>
                                    <option value="job">Job</option>
                                </select>
                            </td>
                        </tr>

                        <tr>
                            <td><span>Topics:</span></td>
                            <td>

                                <label>
                                    <input type="checkbox" name="topics[]" value="web development" required />
                                    Web Development
                                </label>

                                <label>
                                    <input type="checkbox" name="topics[]" value="mobile development" />
                                    Mobile Development
                                </label>

                                <label>
                                    <input type="checkbox" name="topics[]" value="ai/ml development" />
                                    AI/ML Development
                                </label>
                            </td>
                        </tr>

                        <tr>
                            <td><label for="date">Consultation Date:</label></td>
                            <td>
                                <input type="date" id="date" name="date" required />
                            </td>
                        </tr>

                        <tr>
                            <td>
                                <input type="submit" value="Submit" />
                            </td>
                            <td>
                                <input type="reset" value="Reset" />
                            </td>
                        </tr>
                    </table>

                </fieldset>
            </form>
        </section>
    </main>

</body>

</html>
